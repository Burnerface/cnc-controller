name: Deploy Slicer

on:
  push:
    branches:
      - main
    paths:
      - 'slicer/**'
      - 'docker-compose.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build et restart
        run: |
          cd /data/compose/33
          docker compose build slicer
          docker compose up -d slicer

      - name: Health check
        run: |
          sleep 5
          curl -sf http://localhost:5174/health && echo "Slicer OK"
