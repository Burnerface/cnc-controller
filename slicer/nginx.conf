server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;
    gzip on;
    gzip_types text/html text/css application/javascript;

    location /health {
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    location /api/ {
        proxy_pass http://cnc-backend:8086/;
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
